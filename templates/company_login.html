{% extends "base.html" %}
{% block title %}업체 로그인{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold text-center mb-6">업체 로그인</h1>

        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{{ error }}</div>
        {% endif %}

        <form action="/company/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>
            <button type="submit"
                class="w-full bg-primary hover:bg-secondary text-white font-bold py-3 rounded-lg transition">
                로그인
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            아직 회원이 아니신가요? <a href="/company/register" class="text-primary font-medium">업체 등록</a>
        </p>
        <p class="text-center text-sm text-gray-500 mt-2">
            입점을 검토 중이신가요? <a href="/company/inquiry" class="text-primary font-medium">입점 문의</a>
        </p>
        <p class="text-center text-sm mt-2">
            <a href="/" class="text-gray-400 hover:text-gray-600">홈으로</a>
        </p>
    </div>
</div>
{% endblock %}
