{% extends "base.html" %}
{% block title %}업체 등록{% endblock %}

{% block body %}
<div class="min-h-screen py-12 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-lg mx-auto">
        <h1 class="text-2xl font-bold text-center mb-2">업체 등록</h1>
        <p class="text-center text-gray-500 text-sm mb-6">회생/파산 상담 DB를 받아보세요</p>

        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{{ error }}</div>
        {% endif %}

        <form action="/company/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">업체명 <span class="text-red-500">*</span></label>
                <input type="text" name="company_name" required placeholder="법무법인 OO"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">사업자등록번호 <span class="text-red-500">*</span></label>
                <input type="text" name="business_number" required placeholder="000-00-00000"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">담당자명 <span class="text-red-500">*</span></label>
                    <input type="text" name="contact_name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">담당자 연락처 <span class="text-red-500">*</span></label>
                    <input type="tel" name="contact_phone" required placeholder="010-0000-0000"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">이메일 (로그인용) <span class="text-red-500">*</span></label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호 <span class="text-red-500">*</span></label>
                <input type="password" name="password" required minlength="6"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>

            <hr class="my-2">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">관심 상담유형 (선택하지 않으면 전체)</label>
                <div class="grid grid-cols-2 gap-2">
                    {% for key, label in debt_types.items() %}
                    <label class="flex items-center p-2 border border-gray-200 rounded-lg cursor-pointer hover:border-primary has-[:checked]:border-primary has-[:checked]:bg-blue-50 transition text-sm">
                        <input type="checkbox" name="debt_types" value="{{ key }}" class="mr-2">
                        {{ label }}
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">관심 지역 (선택하지 않으면 전국)</label>
                <div class="grid grid-cols-4 gap-2">
                    {% for region in regions %}
                    <label class="flex items-center p-2 border border-gray-200 rounded-lg cursor-pointer hover:border-primary has-[:checked]:border-primary has-[:checked]:bg-blue-50 transition text-sm">
                        <input type="checkbox" name="regions" value="{{ region }}" class="mr-2 shrink-0">
                        {{ region }}
                    </label>
                    {% endfor %}
                </div>
            </div>

            <button type="submit"
                class="w-full bg-primary hover:bg-secondary text-white font-bold py-3 rounded-lg transition mt-4">
                업체 등록 신청
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            이미 계정이 있으신가요? <a href="/company/login" class="text-primary font-medium">로그인</a>
        </p>
    </div>
</div>
{% endblock %}
