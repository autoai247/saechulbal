{% extends "base.html" %}
{% block title %}업체 등록 완료{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-3">업체 등록 신청 완료!</h1>
        <p class="text-gray-600 mb-6">
            <strong>{{ company.name }}</strong>의 등록 신청이 접수되었습니다.<br>
            관리자 승인 후 DB 열람이 가능합니다.
        </p>
        <a href="/company/login" class="inline-block bg-primary hover:bg-secondary text-white font-medium py-3 px-6 rounded-lg transition">
            로그인 페이지로
        </a>
    </div>
</div>
{% endblock %}
